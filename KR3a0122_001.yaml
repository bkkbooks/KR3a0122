body:
  text: 通語司馬懿誅曹爽褘設甲乙論平其是非甲以為曹爽兄弟凡品庸人苟以宗子枝屬得蒙顧命之任而驕奢僭逸交非其人私樹朋黨謀以亂國懿奮誅討一朝殄盡此所以稱其任副士民之望也乙以為懿感曹仲附已不一豈爽與相干事勢不專以此陰成疵瑕初無忠告侃爾之訓一朝屠戮讒其不意豈大人經國篤本之事乎若爽信有謀主之心大逆已搆而發兵之日更以芳委爽兄弟懿父子從後閉門舉兵蹙而向芳必無悉寧忠臣為君深慮之謂乎以此推之爽無大惡明矣若懿以爽奢僭廢之刑之可也滅其尺口被以不義絶子丹血食及何晏子魏之親甥亦與同戮為僭濫不當矣蜀志費褘傳裴松之注引殷基通語初權既立和為太子而封霸為魯王初拜猶同宮室禮秩未分群公之議以為太子國王上下有序禮秩宜異於是分宮別寮而隙端開矣自侍御賓客造為二端仇黨疑二滋延大臣丞相陸遜大將軍諸葛恪太常顧談驃騎將軍朱據會稽太守滕胤大都督施績尚書丁密等奉禮而行宗祀太子驃騎將軍步騭鎮南將軍呂岱大司馬全綜左將軍呂據中書令孫宏等附魯王中外官僚將軍大臣舉國中分權患之謂侍中孫峻曰子弟不睦臣下分部將有袁氏之敗為天下笑一人立者安得不亂於是有改嗣之規矣吳志吳主五子傳裴松之注璩爭曰臣聞太子國之本根雅性仁孝天下歸心今卒責之將有一朝之慮昔晉獻用驪姬而申生不存漢武信江充而戾太子冤死臣竊懼太子不堪其憂雖立思子之宮無所復及矣吳志朱據傳注殷禮字德嗣幼而鄉里異之七歲就官學書在師未嘗戲弄諷誦恆不為聲潛識而已師殺雞詣禮父穎曰賀此子能興君門行在舟車手不釋卷從曲阿往返遂不知隄瀆廣狹及行旅喧鬧未嘗視之時人語曰奇才強記殷德嗣少為郡吏年十九守吳縣丞孫權為王召除郎中後與張溫俱使蜀至荊州虎牙遭水衆人失色德嗣見之無異諸葛亮見之歎曰東吳菰蘆中乃有奇偉如此人與兄瑾書云殷德嗣秀才今之僑肹者也稍遷至零陵太守卒官吳志顧邵傳注輪者車之跡楫者舟之羽身之須道如此二物馬總意林卷四毀彼者雷同而鴉噪稱此者火燎而波駭或問陳蕃忠乎答云單車作討賊之斧直階非亂世之資知其忠不知其智也才貴精學貴講質勝文石建文勝質蔡雍文質彬彬徐幹庶幾也並同上
